name: Validate CLI and MCP Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs at 00:00 UTC every day (approx. 4 PM or 5 PM PDT)
    - cron: '0 0 * * *'

jobs:
  test-mcp-and-cli:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Run PEP8 Check
      run: |
        python -m pip install --upgrade pip      
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium --with-deps
    - name: Validate CLI Tool
      run: |
        # Simulate a location input and verify that a price ($) is found in the output
        printf "San Jose, CA\n" | python3 gas_tool.py | grep "\$"
      env:
        PYTHONPATH: .
    - name: Validate MCP Server
      run: |
        # Launches the server to verify imports and FastMCP initialization.
        # timeout 15s ensures we don't hang.
        # [ $? -eq 124 ] treats the timeout (success) as a passed test.
        timeout 15s python3 gas_server.py || [ $? -eq 124 ]
      env:
        PYTHONPATH: .

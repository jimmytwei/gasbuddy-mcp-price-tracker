name: Validate CLI and MCP Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  test-mcp:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright playwright-stealth fastmcp
        playwright install chromium --with-deps

    - name: Validate CLI Tool
      run: |
        printf "San Jose, CA\n" | python3 gas_tool.py | grep "\$"
      env:
        PYTHONPATH: .

    - name: Validate MCP Server (Smoke Test)
      run: |
        # This command attempts to list tools. 
        # If the server fails to start or 'fastmcp' is missing, it will exit with code 1.
        npx -y @modelcontextprotocol/inspector --list-tools python3 gas_server.py
      env:
        PYTHONPATH: .

name: Validate CLI Tool

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-cli:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5  # Upgraded from v4 to v5 for Node 24

    - name: Set up Python
      uses: actions/setup-python@v6  # Upgraded from v5 to v6 for Node 24
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright playwright-stealth
        playwright install chromium --with-deps

    - name: Run Gas Tool Validation
      run: |
        # Simulate location input and verify output contains a price ($)
        printf "San Jose, CA\n" | python3 gas_tool.py | grep "\$"
      env:
        PYTHONPATH: .

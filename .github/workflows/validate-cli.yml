name: Validate CLI Tool

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-cli:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Ensure Playwright and its system dependencies are ready
        pip install playwright playwright-stealth
        playwright install chromium --with-deps

    - name: Run Gas Tool Validation
      run: |
        # We use 'printf' to simulate a user typing a location into the input() prompt
        # We then grep for the '$' sign to ensure a price was actually found
        printf "San Jose, CA\n" | python3 gas_tool.py | grep "\$"
      env:
        PYTHONPATH: .

name: Validate CLI Tool

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs at 00:00 UTC every day (roughly 5 PM or 4 PM PDT depending on DST)
    - cron: '0 0 * * *'

jobs:
  test-cli:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright playwright-stealth
        playwright install chromium --with-deps

    - name: Run Gas Tool Validation
      run: |
        # Simulate location input and verify output contains a price ($)
        printf "San Jose, CA\n" | python3 gas_tool.py | grep "\$"
      env:
        PYTHONPATH: .
